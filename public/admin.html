<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Prompt Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        .glass { background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="min-h-screen p-6">
    <div class="max-w-2xl mx-auto">
        <!-- Header -->
        <div class="glass rounded-2xl p-6 mb-6">
            <div class="flex items-center gap-3 mb-4">
                <i class="fas fa-lock text-purple-400 text-2xl"></i>
                <h1 class="text-white text-2xl font-bold">Admin Panel</h1>
            </div>
            <p class="text-white/60 text-sm">Add new prompts to the database</p>
        </div>

        <!-- Login Form -->
        <div id="loginForm" class="glass rounded-2xl p-6">
            <div class="mb-4">
                <label class="text-white block mb-2">Admin Password</label>
                <input type="password" id="adminPassword" class="w-full px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500" placeholder="Enter admin password">
            </div>
            <button onclick="login()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 text-white py-3 rounded-xl font-semibold">Login</button>
        </div>

        <!-- Add Prompt Form (Hidden initially) -->
        <div id="addForm" class="glass rounded-2xl p-6 hidden">
            <div class="mb-4">
                <label class="text-white block mb-2">Title</label>
                <input type="text" id="title" class="w-full px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500" placeholder="e.g., Cyberpunk Samurai">
            </div>
            
            <div class="mb-4">
                <label class="text-white block mb-2">Category</label>
                <select id="category" class="w-full px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500">
                    <option value="Portrait">Portrait</option>
                    <option value="Cyberpunk">Cyberpunk</option>
                    <option value="Fantasy">Fantasy</option>
                    <option value="Nature">Nature</option>
                    <option value="Abstract">Abstract</option>
                    <option value="Architecture">Architecture</option>
                    <option value="Character">Character</option>
                    <option value="Sci-Fi">Sci-Fi</option>
                </select>
            </div>
            
            <div class="mb-4">
                <label class="text-white block mb-2">Prompt Text</label>
                <textarea id="prompt" rows="5" class="w-full px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500" placeholder="Enter the full prompt..."></textarea>
            </div>
            
            <div class="mb-4">
                <label class="text-white block mb-2">Image URL (Optional)</label>
                <input type="text" id="imageUrl" class="w-full px-4 py-2 rounded-xl bg-white/10 border border-white/20 text-white focus:outline-none focus:border-purple-500" placeholder="https://picsum.photos/400/300">
            </div>
            
            <button onclick="addPrompt()" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 rounded-xl font-semibold mb-3">
                <i class="fas fa-plus mr-2"></i> Add Prompt
            </button>
            
            <button onclick="logout()" class="w-full bg-white/10 text-white/80 py-2 rounded-xl font-semibold">
                Logout
            </button>
            
            <div id="message" class="mt-4 text-center text-sm"></div>
        </div>
    </div>

    <script>
        let adminKey = '';

        async function login() {
            const password = document.getElementById('adminPassword').value;
            adminKey = password;
            
            // Verify by trying to fetch stats
            try {
                const res = await fetch('/api/stats');
                if (res.ok) {
                    // Show add form
                    document.getElementById('loginForm').classList.add('hidden');
                    document.getElementById('addForm').classList.remove('hidden');
                    showMessage('✅ Login successful!', 'text-green-400');
                    loadStats();
                } else {
                    showMessage('❌ Invalid password', 'text-red-400');
                }
            } catch (error) {
                showMessage('❌ Connection error', 'text-red-400');
            }
        }

        async function addPrompt() {
            const title = document.getElementById('title').value;
            const category = document.getElementById('category').value;
            const prompt = document.getElementById('prompt').value;
            const imageUrl = document.getElementById('imageUrl').value;
            
            if (!title || !prompt) {
                showMessage('❌ Title and Prompt are required!', 'text-red-400');
                return;
            }
            
            try {
                const res = await fetch('/api/admin/prompts', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ title, category, prompt, imageUrl, adminKey })
                });
                
                const data = await res.json();
                if (data.success) {
                    showMessage('✅ Prompt added successfully!', 'text-green-400');
                    clearForm();
                } else {
                    showMessage('❌ ' + data.error, 'text-red-400');
                }
            } catch (error) {
                showMessage('❌ Error adding prompt', 'text-red-400');
            }
        }

        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const data = await res.json();
                if (data.success) {
                    showMessage(`📊 Total prompts: ${data.stats.totalPrompts}`, 'text-blue-400');
                }
            } catch (error) {}
        }

        function clearForm() {
            document.getElementById('title').value = '';
            document.getElementById('prompt').value = '';
            document.getElementById('imageUrl').value = '';
        }

        function logout() {
            document.getElementById('loginForm').classList.remove('hidden');
            document.getElementById('addForm').classList.add('hidden');
            document.getElementById('adminPassword').value = '';
            showMessage('', '');
        }

        function showMessage(msg, color) {
            const msgDiv = document.getElementById('message');
            msgDiv.innerHTML = msg;
            msgDiv.className = `mt-4 text-center text-sm ${color}`;
            setTimeout(() => { if (msgDiv.innerHTML === msg) msgDiv.innerHTML = ''; }, 3000);
        }
    </script>
</body>
</html>
