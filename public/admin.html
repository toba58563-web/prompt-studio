<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Panel - Prompt Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        
        .glass {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.3s ease;
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        .input-field {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: all 0.2s;
        }
        
        .input-field:focus {
            outline: none;
            border-color: #8b5cf6;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .toast-show {
            animation: slideUp 0.3s ease-out forwards;
        }
        
        @keyframes slideUp {
            from { transform: translateY(100px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 min-h-screen">
    <div class="max-w-md w-full">
        <!-- Login Card -->
        <div id="loginCard" class="glass p-8">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-purple-500 to-pink-500 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-shield-alt text-white text-3xl"></i>
                </div>
                <h2 class="text-white text-2xl font-bold">Admin Login</h2>
                <p class="text-white/60 text-sm mt-1">Enter your credentials</p>
            </div>
            
            <input type="email" id="loginEmail" placeholder="Admin Email" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-white/50 mb-3">
            <input type="password" id="loginPassword" placeholder="Password" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-white/50 mb-4">
            <button onclick="adminLogin()" class="w-full bg-gradient-to-r from-purple-500 to-pink-500 hover:from-purple-600 hover:to-pink-600 py-3 rounded-xl font-semibold text-white transition-all">
                <i class="fas fa-sign-in-alt mr-2"></i> Login
            </button>
            <div id="loginError" class="mt-4 text-red-400 text-sm text-center hidden"></div>
        </div>

        <!-- Dashboard Card (After Login) -->
        <div id="dashboardCard" class="glass p-8 hidden">
            <div class="text-center mb-6">
                <div class="w-20 h-20 bg-gradient-to-br from-green-500 to-emerald-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg">
                    <i class="fas fa-crown text-white text-3xl"></i>
                </div>
                <h2 class="text-white text-2xl font-bold">Admin Dashboard</h2>
                <p id="adminEmailDisplay" class="text-white/60 text-sm mt-1">admin@promptstudio.com</p>
            </div>
            
            <!-- Change Password Section -->
            <div class="glass-card p-5 mb-4">
                <div class="flex items-center gap-2 mb-4">
                    <i class="fas fa-key text-yellow-400 text-lg"></i>
                    <h3 class="text-white font-semibold text-lg">Change Password</h3>
                </div>
                <input type="password" id="currentPassword" placeholder="Current Password" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-white/50 mb-3">
                <input type="password" id="newPassword" placeholder="New Password (min 6 characters)" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-white/50 mb-3">
                <input type="password" id="confirmPassword" placeholder="Confirm New Password" class="input-field w-full px-4 py-3 rounded-xl text-white placeholder-white/50 mb-4">
                <button onclick="changePassword()" class="w-full bg-gradient-to-r from-yellow-500 to-orange-500 hover:from-yellow-600 hover:to-orange-600 py-3 rounded-xl font-semibold text-white transition-all">
                    <i class="fas fa-save mr-2"></i> Update Password
                </button>
            </div>
            
            <!-- Logout Button -->
            <button onclick="adminLogout()" class="w-full bg-red-500/20 hover:bg-red-500/30 py-3 rounded-xl font-semibold text-white/80 transition-all">
                <i class="fas fa-sign-out-alt mr-2"></i> Logout
            </button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-8 left-1/2 transform -translate-x-1/2 z-50 hidden">
        <div class="bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl">
            <i class="fas fa-check-circle"></i>
            <span id="toastMsg">Success!</span>
        </div>
    </div>

    <script>
        let adminToken = null;
        
        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            const toastMsg = document.getElementById('toastMsg');
            const toastDiv = toast.querySelector('div');
            
            toastMsg.textContent = message;
            
            if (isError) {
                toastDiv.className = 'bg-gradient-to-r from-red-500 to-red-600 text-white px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl';
            } else {
                toastDiv.className = 'bg-gradient-to-r from-green-500 to-emerald-600 text-white px-6 py-3 rounded-full flex items-center gap-2 shadow-2xl';
            }
            
            toast.classList.remove('hidden');
            toast.classList.add('toast-show');
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('toast-show');
            }, 3000);
        }
        
        async function adminLogin() {
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            const errorDiv = document.getElementById('loginError');
            
            if (!email || !password) {
                errorDiv.textContent = 'Please enter email and password';
                errorDiv.classList.remove('hidden');
                return;
            }
            
            try {
                const response = await fetch('/api/admin/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    adminToken = data.token;
                    localStorage.setItem('adminToken', adminToken);
                    
                    document.getElementById('adminEmailDisplay').textContent = data.admin.email;
                    document.getElementById('loginCard').classList.add('hidden');
                    document.getElementById('dashboardCard').classList.remove('hidden');
                    document.getElementById('loginEmail').value = '';
                    document.getElementById('loginPassword').value = '';
                    errorDiv.classList.add('hidden');
                    showToast(`Welcome, ${data.admin.email}!`);
                } else {
                    errorDiv.textContent = data.error || 'Login failed';
                    errorDiv.classList.remove('hidden');
                }
            } catch (error) {
                console.error('Login error:', error);
                errorDiv.textContent = 'Connection error. Please try again.';
                errorDiv.classList.remove('hidden');
            }
        }
        
        async function changePassword() {
            const currentPassword = document.getElementById('currentPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            if (!currentPassword || !newPassword || !confirmPassword) {
                showToast('Please fill all password fields', true);
                return;
            }
            
            if (newPassword !== confirmPassword) {
                showToast('New passwords do not match', true);
                return;
            }
            
            if (newPassword.length < 6) {
                showToast('New password must be at least 6 characters', true);
                return;
            }
            
            try {
                const response = await fetch('/api/admin/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${adminToken}`
                    },
                    body: JSON.stringify({ currentPassword, newPassword })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    showToast('✅ Password changed successfully! Please login again.');
                    
                    // Clear form
                    document.getElementById('currentPassword').value = '';
                    document.getElementById('newPassword').value = '';
                    document.getElementById('confirmPassword').value = '';
                    
                    // Logout after 2 seconds
                    setTimeout(() => {
                        adminLogout();
                    }, 2000);
                } else {
                    showToast(data.error || 'Failed to change password', true);
                }
            } catch (error) {
                console.error('Change password error:', error);
                showToast('Network error. Please try again.', true);
            }
        }
        
        function adminLogout() {
            adminToken = null;
            localStorage.removeItem('adminToken');
            document.getElementById('dashboardCard').classList.add('hidden');
            document.getElementById('loginCard').classList.remove('hidden');
            document.getElementById('loginError').classList.add('hidden');
            showToast('Logged out successfully');
        }
        
        async function checkAdminSession() {
            const token = localStorage.getItem('adminToken');
            if (!token) return;
            
            try {
                const response = await fetch('/api/admin/verify', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const data = await response.json();
                
                if (data.success) {
                    adminToken = token;
                    document.getElementById('adminEmailDisplay').textContent = data.admin.email;
                    document.getElementById('loginCard').classList.add('hidden');
                    document.getElementById('dashboardCard').classList.remove('hidden');
                } else {
                    localStorage.removeItem('adminToken');
                }
            } catch (error) {
                console.error('Session check error:', error);
                localStorage.removeItem('adminToken');
            }
        }
        
        document.addEventListener('DOMContentLoaded', checkAdminSession);
    </script>
</body>
</html>
